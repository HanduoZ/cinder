<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinder</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Cinder</h1>
          <p>Swipe through finished agent work.</p>
        </div>
        <div class="topbar-actions">
          <button id="runningStat" class="stat" type="button"><span id="runningCount">0</span><small>running</small></button>
          <button id="reviewStat" class="stat active" type="button"><span id="reviewCount">0</span><small>to judge</small></button>
          <button id="shippedStat" class="stat" type="button"><span id="shippedCount">0</span><small>shipped</small></button>
        </div>
      </header>

      <section id="stage" class="stage">
        <article class="review-card">
          <div id="emptyState" class="empty-state">
            <h2>No cards to judge</h2>
            <p>Finished results will land here.</p>
          </div>

          <div id="taskView" class="task-view hidden">
            <div class="task-meta">
              <span id="providerBadge" class="badge">agent</span>
              <span id="modelBadge" class="muted"></span>
              <span id="cwdBadge" class="muted"></span>
              <span class="task-meta-spacer"></span>
              <button id="previousCardButton" class="button subtle deck-button" type="button">Prev</button>
              <span id="deckPosition" class="muted deck-position"></span>
              <button id="nextCardButton" class="button subtle deck-button" type="button">Next</button>
            </div>

            <section class="panel context-panel">
              <h2>Last request</h2>
              <pre id="promptText"></pre>
            </section>

            <section class="panel answer-panel">
              <div class="panel-head">
                <h2>Answer</h2>
                <button id="toggleLogButton" class="button subtle">Process</button>
              </div>
              <pre id="answerText"></pre>
            </section>

            <section id="logPanel" class="panel log-panel hidden">
              <h2>Process</h2>
              <pre id="logText"></pre>
            </section>
          </div>
        </article>

        <section id="composer" class="composer hidden">
          <div class="input-shell">
            <textarea id="continueInput" placeholder="Type a request. Enter for newline. Cmd+Enter to send."></textarea>
            <div id="draftControls" class="draft-controls hidden">
              <select id="draftModel" class="compact-control"></select>
              <select id="draftEffort" class="compact-control">
                <option value="">effort: default</option>
              </select>
            </div>
            <button id="actionButton" class="input-action-button" type="button">Send</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
